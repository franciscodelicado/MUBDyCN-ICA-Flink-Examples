services:
  # Orion is an NGSI-v2 context broker
  orion-v2:
    labels:
      org.fiware: "tutorial"
    image: quay.io/fiware/orion:${ORION_VERSION}
    platform: linux/amd64
    hostname: orion
    container_name: fiware-orion
    depends_on:
      - mongo-db
    networks:
      - default
    expose:
      - "${ORION_PORT}"
    ports:
      - "${ORION_PORT}:${ORION_PORT}" # localhost:1026
    command: -dbURI mongodb://mongo-db -logLevel DEBUG
    healthcheck:
      test: curl --fail -s http://orion:${ORION_PORT}/version || exit 1
      interval: 5s

  # IoT-Agent is configured for the UltraLight Protocol
  iot-agent:
    labels:
      org.fiware: "tutorial"
    image: quay.io/fiware/iotagent-ul:${ULTRALIGHT_VERSION}
    hostname: iot-agent
    container_name: fiware-iot-agent
    depends_on:
      - orion-v2
      - mongo-db
      - mosquitto
    networks:
      - default
    ports:
      - "${IOTA_NORTH_PORT}:${IOTA_NORTH_PORT}" # localhost:4041
    environment:
      - IOTA_CB_HOST=orion # name of the context broker to update context
      - IOTA_CB_PORT=${ORION_PORT} # port the context broker listens on to update context
      - IOTA_NORTH_PORT=${IOTA_NORTH_PORT}
      - IOTA_REGISTRY_TYPE=mongodb #Whether to hold IoT device info in memory or in a database
      - IOTA_LOG_LEVEL=DEBUG # The log level of the IoT Agent
      - IOTA_TIMESTAMP=true # Supply timestamp information with each measurement
      - IOTA_CB_NGSI_VERSION=v2 # use NGSIv2 when sending updates for active attributes
      - IOTA_AUTOCAST=true # Ensure Ultralight number values are read as numbers not strings
      - IOTA_MONGO_HOST=mongo-db # The host name of MongoDB
      - IOTA_MONGO_PORT=${MONGO_DB_PORT} # The port mongoDB is listening on
      - IOTA_MONGO_DB=iotagentul # The name of the database used in mongoDB
      - IOTA_MQTT_HOST=mosquitto # The host name of the MQTT Broker
      - IOTA_MQTT_PORT=1883 # The port the MQTT Broker is listening on to receive topics
      - IOTA_DEFAULT_RESOURCE= # Default is blank. I'm using MQTT so I don't need a resource
      - IOTA_PROVIDER_URL=http://iot-agent:${IOTA_NORTH_PORT}
      - IOTA_DEFAULT_TRANSPORT=MQTT
      - IOTA_MULTI_CORE=true
      - IOTA_AMQP_DISABLE=true
    healthcheck:
      interval: 5s

  # MQTT Broker
  mosquitto:
    labels:
      org.fiware: "tutorial"
    image: eclipse-mosquitto:${MOSQUITTO_VERSION}
    hostname: mosquitto
    container_name: mosquitto
    expose:
      - "1883"
      # - "9001"
    ports:
      - "1883:1883" # MQTT default port
    #      - "9001:9001" # Websockets port
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - default

  jobmanager:
    labels:
      org.fiware: "tutorial"
    image: flink:${FLINK_VERSION}
    platform: linux/amd64
    hostname: jobmanager
    container_name: flink-jobmanager
    expose:
      - "${FLINK_WEB_APP_PORT}"
      - "${FLINK_JOB_MANAGER_PORT}"
      - "${FLINK_SERVICE_PORT}"
    ports:
      - "${FLINK_JOB_MANAGER_PORT}:${FLINK_JOB_MANAGER_PORT}"
      - "${FLINK_WEB_APP_PORT}:${FLINK_WEB_APP_PORT}"
    networks:
      - default
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - FLINK_LOG_DIR=/opt/flink/log

    volumes:
      - ./log4j-console.properties:/opt/flink/conf/log4j-console.properties
      - ./flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
  taskmanager:
    labels:
      org.fiware: "tutorial"
    image: flink:${FLINK_VERSION}
    platform: linux/amd64
    hostname: taskmanager
    container_name: flink-taskmanager
    ports:
      - "${FLINK_TASK_MANAGER_PORT_1}:${FLINK_TASK_MANAGER_PORT_1}"
      - "${FLINK_TASK_MANAGER_PORT_2}:${FLINK_TASK_MANAGER_PORT_2}"
      - "${FLINK_SERVICE_PORT}:${FLINK_SERVICE_PORT}"
    networks:
      - default
    depends_on:
      - jobmanager
    command: taskmanager
    links:
      - "jobmanager:jobmanager"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - FLINK_LOG_DIR=/opt/flink/log
    volumes:
      - ./log4j-console.properties:/opt/flink/conf/log4j-console.properties
      - ./flink-conf.yaml:/opt/flink/conf/flink-conf.yaml

  # Database
  mongo-db:
    labels:
      org.fiware: "tutorial"
    image: mongo:${MONGO_DB_VERSION}
    hostname: mongo-db
    container_name: db-mongo
    ports:
      - "${MONGO_DB_PORT}:${MONGO_DB_PORT}" # localhost:27017
    expose:
      - "${MONGO_DB_PORT}"
    networks:
      - default
    volumes:
      - mongo-db:/data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  default:
    labels:
      org.fiware: "tutorial"
    ipam:
      config:
        - subnet: 172.18.100.0/24

volumes:
  mongo-db: ~
